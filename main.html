<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PullStack</title>
<link rel="stylesheet" href="src/css/app.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="11" height="11" rx="2" fill="#c084fc" />
      <rect x="18" y="3" width="11" height="11" rx="2" fill="#ff6b9d" />
      <rect x="3" y="18" width="11" height="11" rx="2" fill="#60a5fa" />
      <rect x="18" y="18" width="11" height="11" rx="2" fill="#34d399" />
    </svg>
    <span class="brand-name">PullStack</span>
  </div>
  <div class="header-meta" id="projectMeta">
    <span class="meta-label">No project</span>
  </div>
  <div class="header-actions">
    <button class="hbtn" id="newProjectBtn">＋ New</button>
    <button class="hbtn" id="openProjectBtn">📂 Open</button>
    <button class="hbtn" id="saveProjectBtn" disabled>💾 Save</button>
    <button class="hbtn" id="previewBtn" disabled>▶ Preview</button>
    <button class="hbtn primary" id="exportBtn" disabled>📤 Export</button>
  </div>
</header>

<main class="workspace">

  <aside class="sidebar" id="sidebar">
    <div class="panel-title">Elements</div>
    <div class="element-palette" id="elementPalette">
      <div class="empty-state">Create or open a project to start</div>
    </div>
  </aside>

  <section class="canvas-wrap">
    <div class="canvas-toolbar">
      <div class="viewport-controls">
        <button class="vbtn active" data-viewport="desktop" title="Desktop">🖥️</button>
        <button class="vbtn" data-viewport="tablet" title="Tablet">📱</button>
        <button class="vbtn" data-viewport="mobile" title="Mobile">📱</button>
      </div>
      <div class="canvas-info" id="canvasInfo"></div>
    </div>
    <div class="canvas-scroller">
      <div class="canvas" id="canvas">
        <div class="canvas-empty">
          <div class="canvas-empty-title">Welcome to PullStack</div>
          <div class="canvas-empty-desc">Create a New project to start dragging elements here.</div>
          <button class="canvas-empty-cta" id="canvasEmptyCta">＋ New Project</button>
        </div>
      </div>
    </div>
  </section>

  <aside class="properties" id="properties">
    <div class="panel-title">Properties</div>
    <div class="properties-body" id="propertiesBody">
      <div class="empty-state">Select an element to edit its properties</div>
    </div>
  </aside>

</main>

<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <h2 class="modal-title">New Project</h2>

    <label class="field">
      <span class="field-label">Project name</span>
      <input type="text" id="projectNameInput" placeholder="my-landing-page" />
    </label>

    <label class="field">
      <span class="field-label">CSS framework</span>
      <select id="cssFrameworkSelect"></select>
    </label>

    <label class="field">
      <span class="field-label">Export target</span>
      <select id="codeFrameworkSelect"></select>
    </label>

    <div class="modal-actions">
      <button class="btn-secondary" id="newProjectCancelBtn">Cancel</button>
      <button class="btn-primary" id="newProjectCreateBtn">Create →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="src/js/project.js"></script>
<script src="src/js/sidebar.js"></script>
<script src="src/js/canvas.js"></script>
<script src="src/js/properties.js"></script>
<script src="src/js/exporter.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
